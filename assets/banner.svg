<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">跟党学 Coding</title>
  <desc id="desc">A grand deep-red ink wash banner with calligraphic title and a young Mao silhouette.</desc>
  <defs>
    <radialGradient id="redGlow" cx="38%" cy="42%" r="82%">
      <stop offset="0" stop-color="#b31d1d"/>
      <stop offset="0.48" stop-color="#7d1111"/>
      <stop offset="1" stop-color="#350707"/>
    </radialGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f7d37b" stop-opacity="0"/>
      <stop offset="0.22" stop-color="#f7d37b" stop-opacity="0.72"/>
      <stop offset="0.78" stop-color="#f7d37b" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#f7d37b" stop-opacity="0"/>
    </linearGradient>
    <filter id="inkBlur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="8"/>
      <feDisplacementMap in="SourceGraphic" scale="12"/>
    </filter>
    <filter id="titleShadow" x="-20%" y="-30%" width="140%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#1b0303" flood-opacity="0.48"/>
    </filter>
    <pattern id="paperGrain" width="180" height="180" patternUnits="userSpaceOnUse">
      <rect width="180" height="180" fill="none"/>
      <circle cx="23" cy="37" r="1.2" fill="#fff1d0" opacity="0.13"/>
      <circle cx="91" cy="68" r="1" fill="#fff1d0" opacity="0.10"/>
      <circle cx="143" cy="118" r="1.4" fill="#fff1d0" opacity="0.11"/>
      <circle cx="54" cy="151" r="0.9" fill="#2a0505" opacity="0.13"/>
    </pattern>
  </defs>

  <rect width="1400" height="520" rx="42" fill="url(#redGlow)"/>
  <rect width="1400" height="520" rx="42" fill="url(#paperGrain)"/>

  <g opacity="0.58" filter="url(#inkBlur)">
    <path d="M-92 390C98 256 221 309 339 209C489 82 628 86 793 134C921 171 1030 146 1178 58C1272 2 1352-3 1494 43V616H-92z" fill="#130202"/>
    <path d="M-60 168C98 121 245 142 358 73C473 3 594-16 733 37C855 84 953 107 1088 57C1222 8 1320 31 1456 111V-60H-60z" fill="#210303"/>
  </g>

  <g opacity="0.9" filter="url(#roughen)">
    <path d="M58 330C180 289 237 213 326 227C430 243 470 138 577 159C669 177 681 247 785 213C871 184 924 113 1022 137C1095 155 1135 216 1219 204C1282 195 1321 153 1392 169V520H0V354C18 348 37 340 58 330z" fill="#170202" opacity="0.5"/>
    <path d="M93 86C190 116 244 84 330 55C451 14 552 24 663 83C748 128 854 122 960 76C1060 33 1172 44 1310 116" fill="none" stroke="#2a0505" stroke-width="44" stroke-linecap="round" opacity="0.34"/>
  </g>

  <g opacity="0.72">
    <path d="M112 107H714" stroke="url(#goldLine)" stroke-width="3"/>
    <path d="M112 414H796" stroke="url(#goldLine)" stroke-width="3"/>
    <text x="114" y="82" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#f7d37b" letter-spacing="6">
      MAO DIALECTICS METHOD KIT
    </text>
    <text x="115" y="450" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#f9e2a8" letter-spacing="5">
      矛盾分析 · 调查研究 · 战略规划 · 执行复盘
    </text>
  </g>

  <g filter="url(#titleShadow)">
    <text x="104" y="274" font-family="STXingkai, Xingkai SC, KaiTi, cursive" font-size="128" font-weight="700" fill="#fff3d2" letter-spacing="6">
      跟党学 Coding
    </text>
    <text x="110" y="334" font-family="Songti SC, STSong, SimSun, serif" font-size="31" font-weight="700" fill="#f7d37b" letter-spacing="6">
      以实践为尺，以辩证为法
    </text>
  </g>

  <g transform="translate(982 74)" filter="url(#titleShadow)">
    <path d="M172 21C206 31 229 55 234 89C240 130 219 160 186 176C178 180 176 187 181 194C198 216 218 240 236 268C262 310 289 344 330 370C344 379 348 395 337 407H19C7 394 10 377 27 368C67 347 93 316 107 279C120 244 139 215 159 195C165 189 163 181 154 177C120 160 100 130 104 91C108 51 134 17 172 21z" fill="#100202"/>
