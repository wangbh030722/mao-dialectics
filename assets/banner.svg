    <path d="M130 170C144 189 166 199 190 196C215 193 235 178 245 157" fill="none" stroke="#260606" stroke-width="9" stroke-linecap="round" opacity="0.7"/>
    <path d="M57 381C96 336 110 286 130 247C147 214 174 200 198 211C219 221 234 252 251 286C271 325 301 356 341 380" fill="#0b0101" opacity="0.94"/>
