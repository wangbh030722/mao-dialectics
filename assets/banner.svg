<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cc2929;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#grad2)"/>

  <!-- Subtle pattern overlay -->
  <rect width="800" height="200" rx="16" fill="url(#grad)" opacity="0.08"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="200" fill="url(#grad)"/>

  <!-- Main title -->
  <text x="60" y="90" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="48" font-weight="bold" fill="#ffffff" letter-spacing="4">
    跟党学 Coding
  </text>

  <!-- Subtitle -->
  <text x="60" y="130" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#a0a0b8" letter-spacing="2">
    以《毛泽东选集》方法论体系为核心的完整思维框架
  </text>

  <!-- Feature tags -->
  <rect x="60" y="148" width="80" height="24" rx="12" fill="#cc2929" opacity="0.9"/>
  <text x="100" y="164" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">辩证分析</text>

  <rect x="148" y="148" width="80" height="24" rx="12" fill="#2e86c1" opacity="0.9"/>
  <text x="188" y="164" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">战略规划</text>

  <rect x="236" y="148" width="80" height="24" rx="12" fill="#1e8449" opacity="0.9"/>
  <text x="276" y="164" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">头脑风暴</text>

  <rect x="324" y="148" width="80" height="24" rx="12" fill="#8e44ad" opacity="0.9"/>
  <text x="364" y="164" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">项目计划</text>

  <rect x="412" y="148" width="80" height="24" rx="12" fill="#d4ac0d" opacity="0.9"/>
  <text x="452" y="164" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">复盘总结</text>
</svg>
