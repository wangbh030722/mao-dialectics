    <text x="199" y="448" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#f7d37b" text-anchor="middle" letter-spacing="4">
      YOUNG MAO SILHOUETTE
    </text>
